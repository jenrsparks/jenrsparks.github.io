title:               "Jen Sparks //"
include:             ['_pages']
exclude:             ['_includes/notes_graph.json']
# You may need to change the base URL depending on your deploy configuration.
baseurl:             ''

# If you are using a host that cannot resolve URLs that do
# not end with .html (such as Neocities), set this to 'true'.
use_html_extension:  false

# Set to `true` to open non-internal links in new tabs, or
# set to `false` to open non-internal links in current tab.
open_external_links_in_new_tab: false

# Set to `true` to replace tweet URLs with Twitter embeds.
# Note that doing so will negatively the reader's privacy
# as their browser will communicate with Twitter's servers.
embed_tweets: false

permalink: pretty
relative_permalinks: false

plugins:
  - jekyll-last-modified-at
  - jekyll-node-module


node_modules:
  modules_dir: node_modules
  assets:
    js: assets/scripts
    css: assets/styles
  copy:
  - source: "fslightbox/"
    target: assets/scripts/fslightbox/

sass:
  sass_dir:          _sass
  style:            :compressed

collections:
  notes:
    label: notes
    output: true
    permalink: /:slug

defaults:
  - scope:
      path: "**/*"
    values:
      layout: "default"
  - scope:
      path: "_pages/**"
    values:
      layout: "page"
  - scope:
      path: "_notes/**/*.md"
    values:
      layout: "note"
  - scope:
      path: "_notes/cocktails/**/*.md"
    values:
      layout: "page"
      category: Cocktails
  # Set up types for photos to be able to display as groups
  - scope:
      path: "assets/images/photography/digital-*"
    values:
      photo_type: "digital"
  - scope:
      path: "assets/images/photography/film-*"
    values:
      photo_type: "film"

